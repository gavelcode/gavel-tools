name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: bazel-${{ runner.os }}-

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Install Bazelisk
        run: |
          sudo curl -fsSL -o /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Quality gates
        run: bash .github/ci/check.sh

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: bazel-out/_coverage/_coverage_report.dat
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Collect JUnit test reports
        if: always()
        run: |
          mkdir -p test-results
          find -L bazel-testlogs -name test.xml 2>/dev/null \
            | while read -r f; do cp "$f" "test-results/$(echo "$f" | tr '/' '_')"; done

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/test-results-action@v1
        with:
          directory: test-results
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
