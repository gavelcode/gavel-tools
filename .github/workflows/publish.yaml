name: Publish to BCR

# Publishes each vX.Y.Z release to the Bazel Central Registry by opening a PR
# from the registry fork. workflow_dispatch allows publishing an existing tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish (e.g. v0.3.8)"
        required: true

permissions:
  id-token: write
  attestations: write
  contents: write

jobs:
  # BCR's presubmit rejects GitHub's auto-generated /archive/refs/tags/ URLs
  # because their checksums are not guaranteed stable. Publishing our own
  # archive as an immutable release asset makes the checksum stable and
  # removes the need for the `@bazel-io skip_check unstable_url` escape hatch.
  release-archive:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag_name || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out the tagged module
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref_name }}

      - name: Build and upload the source archive
        run: |
          version="${TAG#v}"
          asset="gavel-tools-${TAG}.tar.gz"
          if gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null \
            | grep -qx "$asset"; then
            echo "asset ${asset} already published; keeping existing bytes so the checksum stays stable"
            exit 0
          fi
          git archive --format=tar.gz --prefix="gavel-tools-${version}/" -o "$asset" HEAD
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" "$asset"

  publish:
    needs: release-archive
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1.4.2
    with:
      tag_name: ${{ inputs.tag_name || github.ref_name }}
      # Read .bcr templates from the ref the workflow runs on: the tag on a
      # tag push (future releases carry .bcr), or main on workflow_dispatch
      # (so tags cut before .bcr existed can still be published).
      templates_ref: ${{ github.ref_name }}
      registry_fork: gavelcode/bazel-central-registry
      attest: false
      download_default_release_artifacts: false
    secrets:
      publish_token: ${{ secrets.PUBLISH_TO_BCR_TOKEN }}
